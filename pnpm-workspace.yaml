packages:
  - "packages/*"

# Define shared catalog versions for dependencies
# This ensures consistency across packages
catalog:
  "typescript": "^5.4.5"
  "@types/node": "^20.12.0"
  "prettier": "^3.2.5"
  "eslint": "^8.57.0"

# Exclude patterns (if needed)
# These directories will be ignored during workspace discovery
ignored:
  - "**/node_modules"
  - "**/dist"
  - "**/.turbo"
  - "**/coverage"

# Build dependencies serially to avoid esbuild version conflicts
onlyBuiltDependencies:
  - "esbuild"
  - "better-sqlite3"
